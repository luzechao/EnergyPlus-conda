name: Build and publish EnergyPlus conda package

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target.platform }})
    runs-on: ${{ matrix.target.os }}

    # id-token: write is required for OIDC trusted publishing to prefix.dev.
    # Contents: read is required by actions/checkout.
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        target:
          - platform: linux-64
            os: ubuntu-22.04
          - platform: osx-64
            os: macos-13          # Intel runner
          - platform: osx-arm64
            os: macos-14          # Apple Silicon runner
          # win-64 is excluded: the EnergyPlus v25.2.0 source tarball contains
          # macOS .app bundle symlinks (SYMTYPE=2) that rattler-build cannot
          # extract on Windows. Re-enable once upstream fixes the tarball.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # rattler-build-action builds the recipe. We disable its internal
      # upload-artifact step (it uses a hardcoded path that doesn't match our
      # output layout) and do the upload ourselves below.
      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.36
        with:
          recipe-path: recipe/recipe.yaml
          build-args: >-
            --target-platform ${{ matrix.target.platform }}
            -c conda-forge
          upload-artifact: false

      # Show where rattler-build wrote the output (helps debug path issues).
      - name: Find output files
        shell: bash
        run: find / -maxdepth 6 -name "*.conda" -o -name "*.tar.bz2" 2>/dev/null | head -20

      # Upload the built .conda file as a GitHub Actions artifact so it can
      # be downloaded from the Actions UI for inspection.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-pkg-${{ matrix.target.platform }}
          path: output/${{ matrix.target.platform }}/*.conda
          if-no-files-found: error

      # Upload to prefix.dev channel 'natlabrockies' via OIDC (no API key needed).
      # Trusted publisher must be configured at:
      #   https://prefix.dev/channels/natlabrockies/settings
      # with: owner=luzechao, repo=EnergyPlus-conda, workflow=build.yml
      # Only runs on pushes to the default branch or on tags — not on PRs.
      - name: Upload to prefix.dev
        if: >-
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' ||
           github.ref == 'refs/heads/master' ||
           startsWith(github.ref, 'refs/tags/'))
        shell: bash
        run: |
          # Find and upload every .conda file produced by the build step.
          shopt -s nullglob
          EXIT_CODE=0
          for pkg in $(find output -type f -name "*.conda"); do
            echo "Uploading ${pkg}"
            if ! rattler-build upload prefix -c natlabrockies "${pkg}"; then
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE
