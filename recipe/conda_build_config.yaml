# Variant configuration for local rattler-build runs.
# On conda-forge CI this is injected automatically from conda-forge-pinning-feedstock.
# We mirror the relevant subset here so that `pixi run build` works locally without error.

c_compiler:
  - gcc                        # [linux]
  - clang                      # [osx]
  - vs2022                     # [win]

c_compiler_version:            # [unix]
  - 14                         # [linux]
  - 19                         # [osx]

cxx_compiler:
  - gxx                        # [linux]
  - clangxx                    # [osx]
  - vs2022                     # [win]

cxx_compiler_version:          # [unix]
  - 14                         # [linux]
  - 19                         # [osx]

fortran_compiler:              # [unix or win64]
  - gfortran                   # [linux64 or (osx and x86_64)]
  - flang                      # [win64]

fortran_compiler_version:      # [unix or win64]
  - 14                         # [linux]
  - 14                         # [osx]
  - 5                          # [win64]

c_stdlib:
  - sysroot                    # [linux]
  - macosx_deployment_target   # [osx]
  - vs                         # [win]

c_stdlib_version:              # [unix]
  - "2.17"                     # [linux]
  - "11.0"                     # [osx]
