context:
  version: "25.2.0"

package:
  name: energyplus
  version: ${{ version }}

source:
  git: https://github.com/NatLabRockies/EnergyPlus
  tag: "v${{ version }}"
  depth: 1
  submodules: false

build:
  number: 2
  script:
    - if: unix
      then: bash $RECIPE_DIR/build.sh
    - if: win
      then: call "%RECIPE_DIR%\build.bat"

requirements:
  build:
    # On Unix, use conda-forge compilers.
    # On Windows, Visual Studio 2022 (MSVC) and msys64 gfortran are used
    # directly via the VS generator in build.bat — no conda compiler packages.
    - if: unix
      then: ${{ compiler('c') }}
    - if: unix
      then: ${{ compiler('cxx') }}
    - if: unix
      then: ${{ compiler('fortran') }}
    - if: linux
      then: sysroot_linux-64 ==2.17
    - cmake >=3.19
    - ninja
    - python   # variant-injected; needed at configure time for LINK_WITH_PYTHON
  host:
    - python
  run:
    - python

tests:
  - package_contents:
      files:
        - if: unix
          then: bin/energyplus
        - if: win
          then: Library/energyplus.exe
        - if: win
          then: Library/bin/energyplus.bat
  - script:
      # Diagnostic: show what's installed so we can confirm the layout
      - if: win
        then: python -c "import sys,os; lib=os.path.join(sys.prefix,'Library'); print('Library contents:'); [print(' ',f) for f in os.listdir(lib)] if os.path.isdir(lib) else print('NO Library dir')"
      # Diagnostic: show sys.path and check for .pth file
      - if: win
        then: python -c "import sys,os; sp=os.path.join(sys.prefix,'Lib','site-packages'); pth=os.path.join(sp,'energyplus.pth'); print('pth exists:',os.path.exists(pth)); print('pth content:',open(pth).read() if os.path.exists(pth) else 'MISSING'); print('sys.path:',sys.path)"
      # Run energyplus --version
      - if: unix
        then: energyplus --version
      - if: win
        then: python -c "import sys,subprocess,os; exe=os.path.join(sys.prefix,'Library','energyplus.exe'); print('Running:',exe); subprocess.run([exe,'--version'],check=True)"
      # Verify the Python API is importable
      - python -c "from pyenergyplus.api import EnergyPlusAPI; api = EnergyPlusAPI(); print('pyenergyplus OK')"

about:
  homepage: https://energyplus.net
  repository: https://github.com/NatLabRockies/EnergyPlus
  documentation: https://energyplus.net/documentation
  summary: EnergyPlus whole-building energy simulation program
  description: |
    EnergyPlus is a whole building energy simulation program developed by
    the U.S. Department of Energy (DOE) Building Technologies Office (BTO).
    It models heating, cooling, lighting, ventilating, and other energy flows
    in buildings, and includes a Python API for programmatic control.
  license: LicenseRef-EnergyPlus
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - NatLabRockies
