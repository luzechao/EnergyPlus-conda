# Variant configuration for local rattler-build renders.
# Provides the c_stdlib variable required by ${{ stdlib('c') }}.
# On CI, rattler-build-action injects its own variant config — this file
# is only used when running `pixi run build` locally.
#
# Note: rattler-build does NOT support conda-build selector comments (# [linux]).
# All values here apply unconditionally; use recipe.yaml if/then selectors
# for platform-specific logic instead.

c_stdlib:
  - sysroot

c_stdlib_version:
  - "2.17"
